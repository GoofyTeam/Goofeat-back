apiVersion: v1
kind: Service
metadata:
  name: goofeat-back
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  selector:
    app: goofeat-back
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 3000
    protocol: TCP
    name: metrics