apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: goofeat-back
  labels:
    app: goofeat-back
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app: goofeat-back
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
  namespaceSelector:
    matchNames:
    - goofeat